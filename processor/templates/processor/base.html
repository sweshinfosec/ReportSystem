<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORT GENERATOR | VA System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #1a2a3a; 
            --sidebar-bg: #ffffff;
            --bg-light: #F0F2F5;     
            --accent-blue: #5D9CEC;  
            --border-muted: #E0E6ED;
            --sidebar-width: 280px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light); 
            margin: 0; 
            color: var(--primary-dark); 
            height: 100vh;
            display: flex;
            overflow: hidden; 
        }

        /* Fixed Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-muted);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 25px;
            border-bottom: 1px solid var(--border-muted);
        }

        .sidebar-brand {
            font-weight: 700;
            color: var(--primary-dark);
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        /* Navigation Links */
        .nav-column {
            padding: 15px 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .nav-item-custom {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #4A5568;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .nav-item-custom:hover {
            background: #F8FAFC;
            color: var(--accent-blue);
        }

        .nav-item-custom.active {
            background: #EDF2F7;
            color: var(--accent-blue);
            border-left: 4px solid var(--accent-blue);
        }

        .nav-item-custom i:first-child {
            width: 20px;
            margin-right: 12px;
            font-size: 16px;
        }

        /* Sub-menu styling */
        .nav-sub-item {
            display: block;
            padding: 10px 25px 10px 57px; 
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .nav-sub-item:hover {
            background-color: #f8fafc;
            color: var(--accent-blue);
        }

        .nav-sub-item.active {
            background-color: #f1f5f9;
            color: var(--accent-blue);
            font-weight: 700;
            border-left: 4px solid var(--accent-blue);
        }

        /* Chevron Animation */
        .rotate-icon {
            transition: transform 0.3s ease;
            font-size: 10px;
        }

        .nav-item-custom[aria-expanded="true"] .rotate-icon {
            transform: rotate(180deg);
        }

        /* Work Area / Main Content */
        .work-area {
            flex-grow: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .content-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            flex-grow: 1;
        }

        .footer-text {
            font-size: 11px;
            color: #8A9AAB;
            text-align: center;
            padding: 20px 0;
        }

        .nav-group-label {
            padding: 15px 25px 5px;
            font-size: 10px;
            font-weight: 700;
            color: #A0AEC0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="{% url 'home' %}" class="sidebar-brand">
                <i class="fas fa-shield-alt me-2"></i>VA System
            </a>
        </div>

        <nav class="nav-column">
            <a href="{% url 'home' %}" class="nav-item-custom {% if request.resolver_match.url_name == 'home' %}active{% endif %} mb-1">
                <i class="fas fa-th-large"></i> Dashboard
            </a>

            <div class="nav-group-label">Reporting Modules</div>

            <div class="nav-group">
                <a class="nav-item-custom justify-content-between" data-bs-toggle="collapse" href="#vaMenu" role="button" 
                   aria-expanded="{% if 'interim' in request.resolver_match.url_name or 'word' in request.resolver_match.url_name or request.resolver_match.url_name == 'reporting_dashboard' %}true{% else %}false{% endif %}">
                    <span><i class="fas fa-shield-virus"></i> VA Reports</span>
                    <i class="fas fa-chevron-down rotate-icon"></i>
                </a>
                <div class="collapse {% if 'interim' in request.resolver_match.url_name or 'word' in request.resolver_match.url_name or request.resolver_match.url_name == 'reporting_dashboard' %}show{% endif %}" id="vaMenu">
                    
                    <a href="{% url 'interim_pre' %}" class="nav-sub-item {% if request.resolver_match.url_name == 'interim_pre' %}active{% endif %}">
                        Interim Report
                    </a>
                    <a href="{% url 'interim_post' %}" class="nav-sub-item {% if request.resolver_match.url_name == 'interim_post' %}active{% endif %}">
                        Post-Remediation
                    </a>
                    <a href="{% url 'word_report' %}" class="nav-sub-item {% if request.resolver_match.url_name == 'word_report' %}active{% endif %}">
                        Final Word Report
                    </a>
                </div>
            </div>

            <div class="nav-group">
                <a class="nav-item-custom justify-content-between collapsed" data-bs-toggle="collapse" href="#hcrMenu" role="button" aria-expanded="false">
                    <span><i class="fas fa-server"></i> HCR Reports</span>
                    <i class="fas fa-chevron-down rotate-icon"></i>
                </a>
                <div class="collapse" id="hcrMenu">
                    <a href="#" class="nav-sub-item">Interim Report</a>
                </div>
            </div>

            <div class="nav-group">
                <a class="nav-item-custom justify-content-between collapsed" data-bs-toggle="collapse" href="#wptMenu" role="button" aria-expanded="false">
                    <span><i class="fas fa-globe"></i> WPT Reports</span>
                    <i class="fas fa-chevron-down rotate-icon"></i>
                </a>
                <div class="collapse" id="wptMenu">
                    <a href="#" class="nav-sub-item">Interim Report</a>
                </div>
            </div>
        </nav>

        <div class="p-4 border-top">
            <small class="text-muted d-block mb-1" style="font-size: 10px;">SYSTEM STATUS</small>
            <div class="d-flex align-items-center">
                <div style="width: 8px; height: 8px; background: #48BB78; border-radius: 50%; margin-right: 8px;"></div>
                <span style="font-size: 11px; font-weight: 600; color: #4A5568;">Engine Online</span>
            </div>
        </div>
    </aside>

    <main class="work-area">
        <div class="content-container">
            {% block content %}{% endblock %}
        </div>
        
        <div class="footer-text">
            Vulnerability Assessment Reporting System &copy; 2026
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
